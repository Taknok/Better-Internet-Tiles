name: Build and Sign Android App

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+**'
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g. v3.1.2)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create Git Tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Build Github Release
        run: ./gradlew assembleGithubRelease

      - name: Prepare Signing
        run: |
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > release.jks

      - name: Sign APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/github/release -name "*.apk" | head -n 1)
          # Get build-tools path
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # Zipalign the APK
          $BUILD_TOOLS_PATH/zipalign -v 4 "$APK_PATH" app-signed-aligned.apk
          
          # Sign the APK
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_STORE_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out better-internet-tiles-signed.apk app-signed-aligned.apk

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: better-internet-tiles-apk
          path: better-internet-tiles-signed.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: better-internet-tiles-signed.apk
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.event.inputs.version, 'alpha') || contains(github.event.inputs.version, 'beta') }}
          generate_release_notes: true
